// === PHYSICS ===
const nodeMap = {};
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const r = 150 + Math.random() * 200;
  n.x = W / 2 + Math.cos(angle) * r;
  n.y = H / 2 + Math.sin(angle) * r;
  n.vx = 0;
  n.vy = 0;
  n.r = CAT[n.cat].r;
  n.color = CAT[n.cat].color;
  nodeMap[n.id] = n;
});

// Place "me" at center
nodeMap['me'].x = W / 2;
nodeMap['me'].y = H / 2;

function simulate() {
  if (!physicsOn) return;
  
  const dt = 0.3;
  const repulsion = 3000;
  const attraction = 0.008;
  const damping = 0.85;
  const centerPull = 0.001;

  // Repulsion between all nodes
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = repulsion / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      a.vx -= fx * dt; a.vy -= fy * dt;
      b.vx += fx * dt; b.vy += fy * dt;
    }
  }

  // Attraction along edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let idealLen = (e.type === 'spouse' || e.type === 'parent') ? 80 : 140;
    let force = (dist - idealLen) * attraction;
    let fx = (dx / dist) * force;
    let fy = (dy / dist) * force;
    a.vx += fx * dt; a.vy += fy * dt;
    b.vx -= fx * dt; b.vy -= fy * dt;
  });

  // Center gravity
  nodes.forEach(n => {
    n.vx += (W / 2 - n.x) * centerPull;
    n.vy += (H / 2 - n.y) * centerPull;
    n.vx *= damping;
    n.vy *= damping;
    n.x += n.vx * dt;
    n.y += n.vy * dt;
    // Bounds
    n.x = Math.max(n.r, Math.min(W - n.r, n.x));
    n.y = Math.max(n.r, Math.min(H - n.r, n.y));
  });
}

// === RENDER ===
let offsetX = 0, offsetY = 0, scale = 1;

function toScreen(x, y) {
  return [(x + offsetX) * scale, (y + offsetY) * scale];
}
function toWorld(sx, sy) {
  return [sx / scale - offsetX, sy / scale - offsetY];
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.scale(scale, scale);
  ctx.translate(offsetX, offsetY);

  // Draw edges
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = EDGE_COLORS[e.type] || '#444';
    ctx.globalAlpha = 0.25;
    ctx.lineWidth = e.type === 'spouse' ? 2.5 : e.type === 'parent' ? 2 : 1.2;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Draw nodes
  nodes.forEach(n => {
    // Glow
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 2);
    grad.addColorStop(0, n.color + '40');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * 2, 0, Math.PI * 2);
    ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = n.color + 'cc';
    ctx.fill();
    ctx.strokeStyle = n.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = `${n.id === 'me' ? 'bold 14px' : '12px'} "PingFang SC", "Microsoft YaHei", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Truncate if needed
    let label = n.label;
    if (label.length > 6) label = label.substring(0, 5) + '…';
    ctx.fillText(label, n.x, n.y + n.r + 14);
  });

  // Highlight hovered
  if (hoveredNode) {
    const n = hoveredNode;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
}

function loop() {
  simulate();
  draw();
  requestAnimationFrame(loop);
}

// === INTERACTION ===
let hoveredNode = null;
let dragNode = null;
let isPanning = false;
let lastMouse = { x: 0, y: 0 };

function getNodeAt(mx, my) {
  const [wx, wy] = toWorld(mx, my);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = wx - n.x, dy = wy - n.y;
    if (dx * dx + dy * dy < (n.r + 4) * (n.r + 4)) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  
  if (dragNode) {
    const [wx, wy] = toWorld(mx, my);
    dragNode.x = wx;
    dragNode.y = wy;
    dragNode.vx = 0;
    dragNode.vy = 0;
    return;
  }
  
  if (isPanning) {
    const dx = (mx - lastMouse.x) / scale;
    const dy = (my - lastMouse.y) / scale;
    offsetX += dx;
    offsetY += dy;
    lastMouse.x = mx;
    lastMouse.y = my;
    return;
  }
  
  const n = getNodeAt(mx, my);
  hoveredNode = n;
  canvas.style.cursor = n ? 'pointer' : 'grab';
  
  if (n) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 15) + 'px';
    tooltip.style.top = (my + 15) + 'px';
    document.getElementById('tt-name').textContent = n.label;
    document.getElementById('tt-role').textContent = n.desc;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mousedown', e => {
  const mx = e.clientX, my = e.clientY;
  const n = getNodeAt(mx, my);
  if (n) {
    dragNode = n;
    canvas.style.cursor = 'grabbing';
  } else {
    isPanning = true;
    lastMouse.x = mx;
    lastMouse.y = my;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mouseup', () => {
  dragNode = null;
  isPanning = false;
  canvas.style.cursor = 'grab';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX, my = e.clientY;
  // Zoom toward mouse
  offsetX -= mx / scale;
  offsetY -= my / scale;
  scale *= factor;
  scale = Math.max(0.3, Math.min(3, scale));
  offsetX += mx / scale;
  offsetY += my / scale;
}, { passive: false });

function resetView() {
  offsetX = 0; offsetY = 0; scale = 1;
  nodes.forEach((n, i) => {
    const angle = (i / nodes.length) * Math.PI * 2;
    const r = 150 + Math.random() * 200;
    n.x = W / 2 + Math.cos(angle) * r;
    n.y = H / 2 + Math.sin(angle) * r;
    n.vx = 0; n.vy = 0;
  });
  nodeMap['me'].x = W / 2;
  nodeMap['me'].y = H / 2;
}

function togglePhysics() {
  physicsOn = !physicsOn;
}

loop();
</script>
